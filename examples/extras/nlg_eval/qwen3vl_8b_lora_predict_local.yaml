# The batch generation can be SLOW using this config.
# For faster inference, consider using vLLM inference scripts when compatible.

### model
model_name_or_path: /root/Qwen3-VL-8B
adapter_name_or_path: saves/qwen3-vl-8b/lora/sft-local
trust_remote_code: true

### method
stage: sft
do_predict: true
finetuning_type: lora

### dataset
eval_dataset: mllm_demo,identity,alpaca_en_demo
template: qwen3_vl_nothink
cutoff_len: 2048
max_samples: 100
overwrite_cache: true
preprocessing_num_workers: 16
dataloader_num_workers: 4

### output
output_dir: saves/qwen3-vl-8b/lora/predict-local
overwrite_output_dir: true
report_to: none  # choices: [none, wandb, tensorboard, swanlab, mlflow]

### eval
per_device_eval_batch_size: 1
predict_with_generate: true
ddp_timeout: 180000000
