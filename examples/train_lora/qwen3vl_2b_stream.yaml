### model
model_name_or_path: Qwen/Qwen3-VL-2B-Instruct
cache_dir: /ppio_net0/huggingface
trust_remote_code: true
image_max_pixels: 589824

### method
stage: sft
do_train: true
finetuning_type: lora
lora_rank: 8
lora_alpha: 16
lora_dropout: 0.05
lora_target: all
freeze_vision_tower: true
freeze_multi_modal_projector: true
freeze_language_model: false

### dataset
dataset: llava_next_data
template: qwen3_vl_nothink
cutoff_len: 2048
streaming: true
buffer_size: 2048
dataloader_num_workers: 4

### output
output_dir: saves/qwen3-vl-2b/lora/llava-next-data-streaming
logging_steps: 10
save_steps: 1000
plot_loss: true
overwrite_output_dir: true
save_only_model: false
report_to: none

### train
per_device_train_batch_size: 1
gradient_accumulation_steps: 2
learning_rate: 1.0e-4
max_steps: 10000
lr_scheduler_type: cosine
warmup_ratio: 0.03
bf16: true
ddp_timeout: 180000000
resume_from_checkpoint: null

### eval
# Streaming mode supports an integer val_size, for example:
# val_size: 1000
# per_device_eval_batch_size: 1
# eval_strategy: steps
# eval_steps: 1000
